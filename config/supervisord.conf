[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# --- SSH server -------------------------------------------------------------
[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- PostgreSQL 16 ----------------------------------------------------------
# Cluster data lives in /home/dev/.pgdata, which is on the persistent volume.
# So your databases survive container rebuilds.
[program:postgres]
command=/usr/lib/postgresql/16/bin/postgres -D /home/dev/.pgdata
user=dev
environment=PGDATA="/home/dev/.pgdata"
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Redis ------------------------------------------------------------------
[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --protected-mode yes --dir /home/dev/.redis
user=dev
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
